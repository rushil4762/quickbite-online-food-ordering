<section class="sign-in" style="padding-top:100px;">
            <div class="container">
                <div class="signin-content">
                    <div class="signin-image">
                        <figure><img src="/static/img/carousel-1.jpg" alt="sing up image"></figure>
                        
                    </div>

                    <div class="signin-form">
                        
                        <form method="POST" class="reset-form" id="reset-form">
                            {% csrf_token %}
                            <div class="form-group" style="position: relative;">
                                <label><i class="zmdi zmdi-lock"></i></label>
                                <input type="password" name="password" id="password"
                                    placeholder="Password"
                                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$"
                                    required />
                                <span class="togglePassword" style="cursor:pointer; position:absolute; right:10px; top:35%; transform:translateY(-50%);">
                                    <i class="zmdi zmdi-eye"></i>
                                </span>
                            </div>

                            <div class="form-group" style="position: relative;">
                                <label><i class="zmdi zmdi-lock"></i></label>
                                <input type="password" name="confirm_password" id="confirm_password"
                                    placeholder="Confirm Password"
                                    required />
                                <span class="togglePassword" style="cursor:pointer; position:absolute; right:10px; top:35%; transform:translateY(-50%);">
                                    <i class="zmdi zmdi-eye"></i>
                                </span>
                            </div>



  
                            <div class="form-group form-button">
                                <input type="submit" name="signin" id="signin" class="form-submit" value="Reset Password"/>
                            </div>

                            
                            
                        </form>
                        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

                        {% if messages %}
                        {% for message in messages %}
                            <script>
                            Swal.fire({
                                icon: "{% if message.tags == 'error' %}error{% else %}success{% endif %}",
                                title: "{{ message }}",
                                confirmButtonText: "OK"
                            });
                            </script>
                        {% endfor %}
                        {% endif %}
                    </div>
                </div>
            </div>
</section>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.getElementById("reset-form").addEventListener("submit", function(e) {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;

    if (!pattern.test(password)) {
        e.preventDefault();
        Swal.fire({
            icon: "error",
            title: "Invalid Password",
            text: "Password must have at least 8 characters, including uppercase, lowercase, number, and special character."
        });
        return false;
    }

    if (password !== confirmPassword) {
        e.preventDefault();
        Swal.fire({
            icon: "error",
            title: "Password Mismatch",
            text: "Password and Confirm Password do not match!"
        });
        return false;
    }
});
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".togglePassword").forEach(toggle => {
        toggle.addEventListener("click", () => {
            const input = toggle.previousElementSibling; // Targets the input before the icon
            if (input.type === "password") {
                input.type = "text";
                toggle.innerHTML = '<i class="zmdi zmdi-eye-off"></i>';
            } else {
                input.type = "password";
                toggle.innerHTML = '<i class="zmdi zmdi-eye"></i>';
            }
        });
    });
});
</script>
